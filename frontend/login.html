<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080b0f">
<title>LiftLog — Log in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./css/auth.css">
</head>
<body>
  <form class="login-card" id="login-form">
    <h1 class="login-logo">LIFTLOG</h1>
    <div class="login-field">
      <label for="username">Username</label>
      <input id="username" name="username" autocomplete="username" autocapitalize="none" autocorrect="off" required>
    </div>
    <div class="login-field">
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
    </div>
    <button class="login-btn" type="submit">Log in</button>
    <div class="login-error" id="login-error"></div>
  </form>
  <script type="module" src="./js/auth.js"></script>
</body>
</html>
