<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LiftLog">
<meta name="theme-color" content="#080b0f">
<title>LiftLog</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080b0f;
    --surface: #0f1318;
    --card: #141920;
    --border: #1e2530;
    --border-h: #2e3a48;
    --accent: #4af0b0;
    --accent-dim: #1a3d30;
    --accent-t: #2dd896;
    --muted: #3a4a58;
    --text: #c8d8e8;
    --text-d: #5a7080;
    --text-f: #2e3e4e;
    --danger: #ff4455;
    --warn: #f0a030;
    --mono: 'JetBrains Mono', monospace;
    --disp: 'Barlow Condensed', sans-serif;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bot: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 14px; overscroll-behavior: none; }
  body { display: flex; flex-direction: column; }
  input[type=number] { -moz-appearance: textfield; }
  input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input::placeholder { color: var(--text-f); }
  input:focus { outline: none; border-color: var(--accent) !important; }
  button { cursor: pointer; font-family: var(--mono); }
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  #nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: var(--bg); border-bottom: 1px solid var(--border);
    padding: calc(var(--safe-top) + 10px) 20px 10px;
    display: flex; align-items: center; gap: 12px; height: calc(var(--safe-top) + 52px);
  }
  .nav-logo { font-family: var(--disp); font-size: 28px; letter-spacing: 3px; color: var(--accent); font-weight: 700; }
  .nav-spacer { flex: 1; }
  .nav-btn { background: none; border: none; color: var(--text-d); font-size: 11px; padding: 6px 10px; border-radius: 6px; letter-spacing: 0.5px; }
  .nav-btn.active { color: var(--accent-t); }
  .nav-btn:active { background: var(--surface); }

  #main {
    flex: 1;
    margin-top: calc(var(--safe-top) + 52px);
    padding-bottom: calc(var(--safe-bot) + 24px);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .view { display: none; padding: 20px; animation: fadeIn 0.2s ease; }
  .view.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: none; } }

  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; margin-bottom: 10px;
    transition: border-color 0.15s;
  }
  .card:active { border-color: var(--border-h); background: #171e26; }
  .card.clickable { cursor: pointer; }

  .btn-primary {
    width: 100%; background: var(--accent); border: none; border-radius: 10px;
    padding: 16px; font-family: var(--disp); font-size: 22px; letter-spacing: 3px;
    color: var(--bg); font-weight: 700; margin-bottom: 10px;
  }
  .btn-primary:active { opacity: 0.85; }
  .btn-ghost {
    width: 100%; background: none; border: 1px dashed var(--border);
    border-radius: 8px; padding: 10px; color: var(--muted); font-size: 12px;
    margin-top: 6px; letter-spacing: 0.5px;
  }
  .btn-ghost:active { background: var(--surface); }
  .btn-secondary {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px; font-family: var(--disp); font-size: 18px;
    letter-spacing: 2px; color: var(--text); margin-bottom: 10px;
  }
  .btn-secondary:active { opacity: 0.8; }

  .section-label { font-size: 9px; color: var(--text-d); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; margin-top: 24px; }

  .disp { font-family: var(--disp); letter-spacing: 1px; }
  .disp-lg { font-family: var(--disp); font-size: 28px; letter-spacing: 2px; margin-bottom: 4px; }
  .disp-md { font-family: var(--disp); font-size: 20px; letter-spacing: 1px; }
  .disp-sm { font-family: var(--disp); font-size: 18px; letter-spacing: 1px; }
  .text-d { color: var(--text-d); font-size: 11px; margin-top: 4px; }
  .text-accent { color: var(--accent-t); }

  .stat-row { display: flex; gap: 16px; margin-top: 8px; }
  .stat-tag { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .stat-label { font-size: 9px; color: var(--text-d); letter-spacing: 1.5px; text-transform: uppercase; }
  .stat-val { font-family: var(--disp); font-size: 18px; letter-spacing: 1px; }

  .pill { background: var(--accent-dim); color: var(--accent-t); border-radius: 4px; padding: 2px 7px; font-size: 10px; letter-spacing: 1px; display: inline-block; margin: 2px; }

  .set-headers { display: grid; grid-template-columns: 28px 1fr 1fr 56px 28px; gap: 6px; margin-bottom: 4px; padding: 0 2px; }
  .set-header-cell { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-align: center; }
  .set-row { display: grid; grid-template-columns: 28px 1fr 1fr 56px 28px; gap: 6px; margin-bottom: 6px; align-items: center; }
  .set-num { text-align: center; font-size: 11px; color: var(--muted); }
  .set-num.saved { color: var(--accent-t); }
  .set-input {
    background: var(--card); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 4px; color: var(--text); font-family: var(--mono); font-size: 15px;
    text-align: center; width: 100%; transition: border-color 0.15s;
  }
  .set-input.saved { background: transparent; border-color: transparent; }
  .set-save-btn {
    background: var(--accent-dim); border: 1px solid rgba(74,240,176,0.2);
    border-radius: 5px; color: var(--accent-t); font-size: 10px; padding: 8px 4px; width: 100%;
  }
  .set-save-btn:active { opacity: 0.7; }
  .set-saved-check { text-align: center; font-size: 12px; color: var(--accent-t); }
  .set-del-btn { background: none; border: none; color: var(--text-f); font-size: 16px; text-align: center; width: 100%; padding: 4px; }
  .set-del-btn:active { color: var(--danger); }

  @keyframes flash { 0%,100% { background: var(--card); } 35% { background: var(--accent-dim); } }
  .set-flash { animation: flash 1.1s ease; }

  .detail-grid { display: grid; grid-template-columns: 28px 1fr 1fr 1fr; gap: 4px; }
  .detail-head { font-size: 9px; color: var(--muted); letter-spacing: 1px; text-align: center; padding: 4px 0; border-bottom: 1px solid var(--border); }
  .detail-cell { font-size: 13px; text-align: center; padding: 8px 4px; border-bottom: 1px solid var(--border); }
  .detail-cell.accent { color: var(--accent-t); font-weight: 500; }
  .detail-cell.dim { color: var(--text-d); font-size: 10px; }

  #overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 200; flex-direction: column; justify-content: flex-end;
  }
  #overlay.open { display: flex; }
  #overlay-sheet {
    background: var(--surface); border-top: 1px solid var(--border);
    border-radius: 16px 16px 0 0; padding: 20px;
    padding-bottom: calc(var(--safe-bot) + 20px);
    max-height: 72vh; overflow-y: auto;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: none; } }

  .ex-pick-btn {
    width: 100%; background: none; border: none; border-bottom: 1px solid var(--border);
    padding: 13px 4px; color: var(--text); font-family: var(--mono); font-size: 13px;
    text-align: left; letter-spacing: 0.3px;
  }
  .ex-pick-btn:active { background: var(--card); }
  .ex-create-btn {
    width: 100%; background: var(--accent-dim); border: 1px solid rgba(74,240,176,0.25);
    border-radius: 8px; padding: 12px 14px; color: var(--accent-t); font-family: var(--mono);
    font-size: 13px; text-align: left; margin-bottom: 8px; letter-spacing: 0.3px;
  }
  .ex-create-btn:active { opacity: 0.75; }

  .ex-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 14px; }
  .ex-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .ex-del { background: none; border: none; color: var(--text-f); font-size: 20px; line-height: 1; padding: 2px 6px; }
  .ex-del:active { color: var(--danger); }

  .ex-manage-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 1px solid var(--border); }
  .ex-manage-name { font-size: 13px; color: var(--text-d); }
  .ex-remove-btn { background: none; border: none; color: var(--text-f); font-family: var(--mono); font-size: 11px; padding: 4px 8px; }
  .ex-remove-btn:active { color: var(--danger); }

  .search-input {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 11px 14px; color: var(--text); font-family: var(--mono);
    font-size: 13px; margin-bottom: 14px;
  }

  #in-progress-banner { display: none; }
  #in-progress-banner.visible { display: block; }

  .loading { text-align: center; padding: 40px 0; color: var(--text-d); font-size: 12px; }
</style>
</head>
<body>

<nav id="nav">
  <span class="nav-logo">LIFTLOG</span>
  <span class="nav-spacer"></span>
  <button class="nav-btn" id="btn-back" onclick="goBack()" style="display:none">← back</button>
  <button class="nav-btn" id="btn-history" onclick="showView('history')">history</button>
</nav>

<div id="main">

  <!-- HOME -->
  <div class="view active" id="view-home">
    <div id="in-progress-banner" class="card clickable" onclick="showView('workout')" style="border-color: rgba(74,240,176,0.3); margin-bottom:16px;">
      <div style="display:flex; justify-content:space-between; align-items:flex-start;">
        <div>
          <span class="pill">IN PROGRESS</span>
          <div class="disp-md" id="banner-title" style="margin-top:8px;"></div>
          <div class="text-d" id="banner-sub"></div>
        </div>
        <span style="color:var(--accent); font-size:20px;">→</span>
      </div>
    </div>

    <button class="btn-primary" id="start-btn" onclick="startSession()">START WORKOUT</button>

    <div class="section-label" id="recent-label" style="display:none;">recent sessions</div>
    <div id="recent-list"></div>
  </div>

  <!-- WORKOUT -->
  <div class="view" id="view-workout">
    <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px;">
      <div class="disp-lg" id="workout-title"></div>
      <span class="text-d" id="workout-time"></span>
    </div>
    <div class="text-d" id="workout-sub" style="margin-bottom:20px;"></div>
    <div id="exercises-list"></div>
    <button class="btn-secondary" onclick="openOverlay()">+ ADD EXERCISE</button>
    <button class="btn-primary" onclick="finishSession()" style="margin-top:4px; background:var(--accent);">FINISH WORKOUT</button>
  </div>

  <!-- HISTORY -->
  <div class="view" id="view-history">
    <div class="disp-lg">HISTORY</div>
    <div id="history-list"></div>
  </div>

  <!-- SESSION DETAIL -->
  <div class="view" id="view-session-detail">
    <div class="disp-lg" id="detail-title"></div>
    <div class="text-d" id="detail-sub" style="margin-bottom:20px;"></div>
    <div id="detail-exercises"></div>
  </div>

  <!-- MANAGE EXERCISES -->
  <div class="view" id="view-manage">
    <div class="disp-lg">EXERCISES</div>
    <div class="text-d" style="margin-bottom:16px;">add or remove from your library</div>
    <input class="search-input" id="manage-filter" placeholder="filter..." oninput="renderManage()">
    <div id="manage-list"></div>
  </div>

</div>

<!-- ADD EXERCISE OVERLAY -->
<div id="overlay" onclick="overlayBgClick(event)">
  <div id="overlay-sheet">
    <div class="disp-sm" style="font-size:22px; letter-spacing:2px;">ADD EXERCISE</div>
    <input class="search-input" id="ex-filter" placeholder="search or type new..." oninput="renderOverlay()" style="margin-top:12px;">
    <div id="create-btn-container"></div>
    <div id="ex-list"></div>
  </div>
</div>

<script>
// ─── Config ───────────────────────────────────────────────────────────────────
// NOTE for Claude Code: update this to match your VPS subdomain/path
const API = '/api';

// ─── API helpers ──────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const res = await fetch(API + path, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok) throw new Error(`API ${method} ${path} failed: ${res.status}`);
  return res.json();
}
const GET    = (path)        => api('GET', path);
const POST   = (path, body)  => api('POST', path, body);
const PATCH  = (path, body)  => api('PATCH', path, body);
const DELETE = (path)        => api('DELETE', path);

// ─── State ────────────────────────────────────────────────────────────────────
let exercises = [];   // string[]
let sessions  = [];   // completed Session[]
let active    = null; // active Session | null
let currentView = 'home';
let detailSession = null;

// ─── Helpers ──────────────────────────────────────────────────────────────────
function uid() { return '_' + Math.random().toString(36).slice(2) + Date.now().toString(36); }
function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
}
function fmtTime(iso) {
  return new Date(iso).toLocaleTimeString('en-US', { hour:'numeric', minute:'2-digit' });
}
function totalSavedSets(sess) {
  return (sess.exercises||[]).reduce((a,e) => a + (e.sets||[]).filter(s=>s.savedAt).length, 0);
}
function exerciseStats(exName) {
  const allSets = sessions.flatMap(s =>
    (s.exercises||[]).filter(e=>e.name===exName).flatMap(e=>(e.sets||[]))
  ).filter(s => s.weight > 0);
  if (!allSets.length) return null;
  const weights = allSets.map(s => Number(s.weight));
  return {
    maxWeight: Math.max(...weights),
    avgWeight: Math.round(weights.reduce((a,b)=>a+b,0) / weights.length)
  };
}
function el(id) { return document.getElementById(id); }

// ─── Navigation ───────────────────────────────────────────────────────────────
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  el('view-' + name).classList.add('active');
  currentView = name;
  el('btn-back').style.display = name === 'home' ? 'none' : '';
  el('btn-history').style.display = name === 'history' ? 'none' : '';
  el('btn-history').classList.toggle('active', name === 'history');
  if (name === 'home') renderHome();
  if (name === 'history') renderHistory();
  if (name === 'workout') renderWorkout();
  if (name === 'session-detail') renderDetail();
  if (name === 'manage') renderManage();
  window.scrollTo(0, 0);
}
function goBack() {
  if (currentView === 'session-detail') { showView('history'); return; }
  if (currentView === 'manage') { showView('home'); return; }
  showView('home');
}

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  try {
    [exercises, sessions, active] = await Promise.all([
      GET('/exercises'),
      GET('/sessions'),
      GET('/sessions/active'),
    ]);
    renderHome();
  } catch (err) {
    console.error('Init failed:', err);
    el('recent-list').innerHTML = `<div class="loading">could not connect to server</div>`;
  }
}

// ─── Session lifecycle ────────────────────────────────────────────────────────
async function startSession() {
  if (active) { showView('workout'); return; }
  const id = uid();
  const startedAt = new Date().toISOString();
  await POST('/sessions', { id, startedAt });
  active = { id, startedAt, exercises: [] };
  showView('workout');
}

async function finishSession() {
  if (!active) return;
  await PATCH(`/sessions/${active.id}/finish`);
  sessions = [{ ...active, finishedAt: new Date().toISOString() }, ...sessions];
  active = null;
  showView('home');
}

// ─── Exercise management in session ──────────────────────────────────────────
async function addExerciseToSession(name) {
  if (!active) return;
  const id = uid();
  const position = active.exercises.length;
  await POST(`/sessions/${active.id}/exercises`, { id, name, position });
  active.exercises.push({ id, name, sets: [] });
  closeOverlay();
  renderWorkout();
}

async function removeExercise(exId) {
  await DELETE(`/sessions/${active.id}/exercises/${exId}`);
  active.exercises = active.exercises.filter(e => e.id !== exId);
  renderWorkout();
}

async function addSet(exId) {
  const ex = active.exercises.find(e => e.id === exId);
  if (!ex) return;
  const id = uid();
  const position = ex.sets.length;
  await POST(`/sessions/${active.id}/exercises/${exId}/sets`, { id, position });
  ex.sets.push({ id, reps: '', weight: '', savedAt: null });
  renderWorkout();
}

// updateSetField: debounced PATCH — saves as you type
const debounceTimers = {};
function updateSetField(exId, setId, field, val) {
  const ex = active.exercises.find(e => e.id === exId);
  if (!ex) return;
  const s = ex.sets.find(s => s.id === setId);
  if (!s) return;
  s[field] = val;
  // Debounce API call by 600ms so we don't hammer the server on every keystroke
  clearTimeout(debounceTimers[setId]);
  debounceTimers[setId] = setTimeout(() => {
    PATCH(`/sessions/${active.id}/exercises/${exId}/sets/${setId}`, { [field]: val || null })
      .catch(err => console.error('Set update failed:', err));
  }, 600);
}

async function saveSet(exId, setId) {
  const ex = active.exercises.find(e => e.id === exId);
  if (!ex) return;
  const s = ex.sets.find(s => s.id === setId);
  if (!s) return;
  s.reps = Number(s.reps) || 0;
  s.weight = Number(s.weight) || 0;
  s.savedAt = new Date().toISOString();
  await PATCH(`/sessions/${active.id}/exercises/${exId}/sets/${setId}`, {
    reps: s.reps,
    weight: s.weight,
    savedAt: s.savedAt,
  });
  renderWorkout(setId);
}

async function removeSet(exId, setId) {
  await DELETE(`/sessions/${active.id}/exercises/${exId}/sets/${setId}`);
  const ex = active.exercises.find(e => e.id === exId);
  if (!ex) return;
  ex.sets = ex.sets.filter(s => s.id !== setId);
  renderWorkout();
}

// ─── Render: Home ─────────────────────────────────────────────────────────────
function renderHome() {
  const banner = el('in-progress-banner');
  const startBtn = el('start-btn');
  if (active) {
    banner.classList.add('visible');
    startBtn.style.display = 'none';
    el('banner-title').textContent = fmtDate(active.startedAt);
    el('banner-sub').textContent = `started ${fmtTime(active.startedAt)} · ${active.exercises.length} exercises · ${totalSavedSets(active)} sets saved`;
  } else {
    banner.classList.remove('visible');
    startBtn.style.display = '';
  }

  const recent = el('recent-list');
  const lbl = el('recent-label');
  if (sessions.length === 0) { recent.innerHTML = ''; lbl.style.display='none'; return; }
  lbl.style.display = '';
  recent.innerHTML = sessions.slice(0, 5).map(s => `
    <div class="card clickable" onclick="openDetail('${s.id}')">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div>
          <div class="disp-sm">${fmtDate(s.startedAt)}</div>
          <div class="text-d">${s.exercises.length} exercises · ${s.exercises.reduce((a,e)=>a+e.sets.length,0)} sets</div>
          <div style="margin-top:8px; line-height:2;">${(s.exercises||[]).map(e=>`<span class="pill">${e.name}</span>`).join('')}</div>
        </div>
        <span style="color:var(--text-f); font-size:18px;">›</span>
      </div>
    </div>
  `).join('');
}

// ─── Render: Workout ──────────────────────────────────────────────────────────
function renderWorkout(flashSetId) {
  if (!active) return;
  el('workout-title').textContent = fmtDate(active.startedAt);
  el('workout-time').textContent = fmtTime(active.startedAt);
  el('workout-sub').textContent = `${totalSavedSets(active)} sets saved`;

  const list = el('exercises-list');
  if (active.exercises.length === 0) {
    list.innerHTML = `<div style="text-align:center; padding:36px 0; color:var(--text-d); font-size:12px;">no exercises yet — add one below</div>`;
    return;
  }

  list.innerHTML = active.exercises.map(ex => {
    const stats = exerciseStats(ex.name);
    const statsHtml = stats ? `
      <div class="stat-row">
        <div class="stat-tag"><span class="stat-label">PR</span><span class="stat-val text-accent">${stats.maxWeight}lb</span></div>
        <div class="stat-tag"><span class="stat-label">avg</span><span class="stat-val">${stats.avgWeight}lb</span></div>
      </div>` : '';

    const setsHeaderHtml = ex.sets.length ? `
      <div class="set-headers">
        <div class="set-header-cell">#</div>
        <div class="set-header-cell">REPS</div>
        <div class="set-header-cell">LB</div>
        <div class="set-header-cell">SAVE</div>
        <div></div>
      </div>` : '';

    const setsHtml = ex.sets.map((s, si) => {
      const saved = !!s.savedAt;
      const flash = s.id === flashSetId ? 'set-flash' : '';
      return `
        <div class="set-row ${flash}" id="setrow-${s.id}">
          <div class="set-num ${saved ? 'saved' : ''}">${si+1}</div>
          <input class="set-input ${saved ? 'saved' : ''}" type="number" inputmode="numeric" placeholder="—"
            value="${s.reps}" ${saved ? 'readonly' : ''}
            onchange="updateSetField('${ex.id}','${s.id}','reps',this.value)"
            oninput="updateSetField('${ex.id}','${s.id}','reps',this.value)">
          <input class="set-input ${saved ? 'saved' : ''}" type="number" inputmode="decimal" placeholder="—"
            value="${s.weight}" ${saved ? 'readonly' : ''}
            onchange="updateSetField('${ex.id}','${s.id}','weight',this.value)"
            oninput="updateSetField('${ex.id}','${s.id}','weight',this.value)">
          ${saved
            ? `<div class="set-saved-check">✓</div>`
            : `<button class="set-save-btn" onclick="saveSet('${ex.id}','${s.id}')">save</button>`
          }
          <button class="set-del-btn" onclick="removeSet('${ex.id}','${s.id}')">×</button>
        </div>`;
    }).join('');

    return `
      <div class="ex-card">
        <div class="ex-header">
          <div>
            <div class="disp-md">${ex.name}</div>
            ${statsHtml}
          </div>
          <button class="ex-del" onclick="removeExercise('${ex.id}')">×</button>
        </div>
        ${setsHeaderHtml}
        ${setsHtml}
        <button class="btn-ghost" onclick="addSet('${ex.id}')">+ add set</button>
      </div>`;
  }).join('');
}

// ─── Render: History ──────────────────────────────────────────────────────────
function renderHistory() {
  const list = el('history-list');
  if (sessions.length === 0) {
    list.innerHTML = `<div style="text-align:center; padding:40px 0; color:var(--text-d); font-size:12px;">no completed sessions yet</div>`;
    return;
  }
  list.innerHTML = sessions.map(s => `
    <div class="card clickable" onclick="openDetail('${s.id}')">
      <div style="display:flex; justify-content:space-between; align-items:flex-start;">
        <div>
          <div class="disp-sm">${fmtDate(s.startedAt)}</div>
          <div class="text-d">${fmtTime(s.startedAt)}${s.finishedAt ? ' → ' + fmtTime(s.finishedAt) : ''}</div>
          <div style="margin-top:8px; line-height:2;">${(s.exercises||[]).map(e=>`<span class="pill">${e.name}</span>`).join('')}</div>
        </div>
        <span style="color:var(--text-f); font-size:18px;">›</span>
      </div>
    </div>
  `).join('');
}

// ─── Render: Session Detail ───────────────────────────────────────────────────
function openDetail(sessionId) {
  detailSession = sessions.find(s => s.id === sessionId);
  if (!detailSession) return;
  showView('session-detail');
}
function renderDetail() {
  if (!detailSession) return;
  el('detail-title').textContent = fmtDate(detailSession.startedAt);
  el('detail-sub').textContent = `${fmtTime(detailSession.startedAt)}${detailSession.finishedAt ? ' – ' + fmtTime(detailSession.finishedAt) : ''} · ${detailSession.exercises.reduce((a,e)=>a+e.sets.length,0)} total sets`;

  el('detail-exercises').innerHTML = (detailSession.exercises||[]).map(ex => {
    const stats = exerciseStats(ex.name);
    const allTimeHtml = stats ? `
      <div class="stat-row" style="margin-bottom:12px;">
        <div class="stat-tag"><span class="stat-label">all-time PR</span><span class="stat-val text-accent">${stats.maxWeight}lb</span></div>
        <div class="stat-tag"><span class="stat-label">all-time avg</span><span class="stat-val">${stats.avgWeight}lb</span></div>
      </div>` : '';

    const setRows = (ex.sets||[]).map((s, si) => `
      <div class="detail-cell">${si+1}</div>
      <div class="detail-cell">${s.reps || '—'}</div>
      <div class="detail-cell accent">${s.weight || '—'}</div>
      <div class="detail-cell dim">${s.savedAt ? fmtTime(s.savedAt) : '—'}</div>
    `).join('');

    const sessionMax = ex.sets.length ? Math.max(...ex.sets.map(s=>Number(s.weight)||0)) : 0;
    const sessionAvg = ex.sets.length ? Math.round(ex.sets.reduce((a,s)=>a+(Number(s.weight)||0),0)/ex.sets.length) : 0;
    const sessionStatsHtml = ex.sets.length ? `
      <div class="stat-row" style="margin-top:12px; padding-top:10px; border-top:1px solid var(--border);">
        <div class="stat-tag"><span class="stat-label">session max</span><span class="stat-val" style="color:var(--warn)">${sessionMax}lb</span></div>
        <div class="stat-tag"><span class="stat-label">session avg</span><span class="stat-val">${sessionAvg}lb</span></div>
        <div class="stat-tag"><span class="stat-label">sets</span><span class="stat-val">${ex.sets.length}</span></div>
      </div>` : '';

    return `
      <div class="card" style="margin-bottom:14px;">
        <div class="disp-md" style="margin-bottom:10px;">${ex.name}</div>
        ${allTimeHtml}
        <div class="detail-grid">
          <div class="detail-head">SET</div><div class="detail-head">REPS</div>
          <div class="detail-head">LB</div><div class="detail-head">TIME</div>
          ${setRows}
        </div>
        ${sessionStatsHtml}
      </div>`;
  }).join('');
}

// ─── Render: Manage ───────────────────────────────────────────────────────────
function renderManage() {
  const filter = (el('manage-filter').value || '').toLowerCase();
  const filtered = exercises.filter(e => e.toLowerCase().includes(filter));
  el('manage-list').innerHTML = filtered.map(name => `
    <div class="ex-manage-row">
      <span class="ex-manage-name">${name}</span>
      <button class="ex-remove-btn" onclick="removeExercise_lib('${name}')">remove</button>
    </div>
  `).join('');
}

async function removeExercise_lib(name) {
  await DELETE(`/exercises/${encodeURIComponent(name)}`);
  exercises = exercises.filter(e => e !== name);
  renderManage();
}

// ─── Overlay ──────────────────────────────────────────────────────────────────
function openOverlay() {
  el('ex-filter').value = '';
  renderOverlay();
  el('overlay').classList.add('open');
  setTimeout(() => el('ex-filter').focus(), 100);
}
function closeOverlay() { el('overlay').classList.remove('open'); }
function overlayBgClick(e) { if (e.target === el('overlay')) closeOverlay(); }

function renderOverlay() {
  const filter = el('ex-filter').value.trim();
  const filtered = exercises.filter(e => e.toLowerCase().includes(filter.toLowerCase()));
  const alreadyAdded = new Set((active?.exercises||[]).map(e=>e.name));

  const createBtn = el('create-btn-container');
  if (filter && !exercises.some(e => e.toLowerCase() === filter.toLowerCase())) {
    createBtn.innerHTML = `<button class="ex-create-btn" onclick="createAndAdd('${filter.replace(/'/g,"\\'")}')">＋ create "${filter}"</button>`;
  } else {
    createBtn.innerHTML = '';
  }

  el('ex-list').innerHTML = filtered.map(name => `
    <button class="ex-pick-btn" onclick="addExerciseToSession('${name.replace(/'/g,"\\'")}')">
      ${name}${alreadyAdded.has(name) ? ' <span style="color:var(--accent-t); font-size:10px;">✓ added</span>' : ''}
    </button>
  `).join('');
}

async function createAndAdd(name) {
  if (!exercises.includes(name)) {
    await POST('/exercises', { name });
    exercises.push(name);
  }
  addExerciseToSession(name);
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
